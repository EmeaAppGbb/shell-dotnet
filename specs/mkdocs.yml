site_name: Shell .NET Documentation
site_description: Technical documentation and feature specifications for the Shell .NET application
site_author: EMEA App GBB Team

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Technical Documentation:
    - Architecture:
      - Overview: architecture/overview.md
      - Components: architecture/components.md
      - Patterns: architecture/patterns.md
      - Security: architecture/security.md
    - Infrastructure:
      - Deployment: infrastructure/deployment.md
      - Environments: infrastructure/environments.md
      - Operations: infrastructure/operations.md
    - Integration:
      - APIs: integration/apis.md
      - Databases: integration/databases.md
      - Services: integration/services.md
    - Technology:
      - Stack: technology/stack.md
      - Dependencies: technology/dependencies.md
      - Tools: technology/tools.md
  - Feature Requirements:
    - Dashboard Navigation: features/dashboard-navigation.md
    - Temperature Management: features/temperature-management.md
    - Weather Forecast Display: features/weather-forecast-display.md
